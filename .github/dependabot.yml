version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "15:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "15:30"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
