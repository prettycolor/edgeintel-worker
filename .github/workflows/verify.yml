name: Verify

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply local D1 migrations
        run: npm run db:local:apply

      - name: Verify monorepo
        run: npm run verify
